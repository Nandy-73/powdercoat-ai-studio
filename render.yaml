# Render Blueprint — deploys PowderCoat AI Studio as one service + a PostgreSQL DB.
# The service name below becomes the URL: https://powdercoat-ai-studio.onrender.com
databases:
  - name: powdercoat-db
    plan: free
    databaseName: powdercoat
    user: powdercoat

services:
  - type: web
    name: powdercoat-ai-studio
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: powdercoat-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true          # Render generates a strong random secret
      - key: SEED_DATA
        value: "true"                # seed reference data on first boot
      - key: ENVIRONMENT
        value: production
