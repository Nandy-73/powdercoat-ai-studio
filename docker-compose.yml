version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: powdercoat-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-powdercoat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-powdercoat_secret}
      POSTGRES_DB: ${POSTGRES_DB:-powdercoat}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-powdercoat}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: powdercoat-api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-powdercoat}:${POSTGRES_PASSWORD:-powdercoat_secret}@db:5432/${POSTGRES_DB:-powdercoat}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ENVIRONMENT: production
      SEED_DATA: "true"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    container_name: powdercoat-web
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  pgdata:
